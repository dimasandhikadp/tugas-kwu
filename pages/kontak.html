<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaFresh - Hubungi Kami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-700 font-['Inter'] pb-16">
    <header class="sticky top-0 z-50 flex justify-between items-center px-[8%] py-4 bg-white shadow-sm">
        <div class="text-2xl font-bold text-sky-600">SeaFresh</div>
        <nav class="hidden lg:flex gap-6 text-sm font-medium text-slate-600">
            <a href="index.html" class="hover:text-sky-600">Beranda</a>
            <a href="kategori.html" class="hover:text-sky-600">Kategori</a>
            <a href="tentang-kami.html" class="hover:text-sky-600">Tentang Kami</a>
            <a href="cara-belanja.html" class="hover:text-sky-600">Cara Belanja</a>
            <a href="blog.html" class="hover:text-sky-600">Blog</a>
            <a href="kontak.html" class="text-sky-600 font-semibold">Kontak</a>
        </nav>
    </header>

    <main class="max-w-xl mx-auto mt-12 px-5">
        <div class="bg-white border border-slate-200 rounded-2xl p-6 md:p-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-2 text-center">Hubungi Kami</h1>
            <p class="text-xs text-slate-400 text-center mb-6">Punya pertanyaan atau kendala? Kirimkan pesan di bawah ini.</p>
            
            <form class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-slate-600 block mb-1">Nama Lengkap</label>
                    <input type="text" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-sky-500">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-600 block mb-1">Pesan Anda</label>
                    <textarea rows="4" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-sky-500"></textarea>
                </div>
                <button class="w-full py-2.5 bg-sky-600 text-white rounded-lg font-semibold text-sm hover:bg-sky-700 transition">Kirim Pesan</button>
            </form>
        </div>
    </main>
</body>
</html>
